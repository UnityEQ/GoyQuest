name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r newbs/requirements-build.txt

      - name: Build Goyquest.exe
        working-directory: newbs
        run: python -m PyInstaller --noconfirm --clean goyquest.spec

      - name: Package zip
        shell: pwsh
        run: |
          if (Test-Path newbs/dist/Goyquest-windows.zip) {
            Remove-Item newbs/dist/Goyquest-windows.zip -Force
          }
          Compress-Archive -Path newbs/dist/Goyquest -DestinationPath newbs/dist/Goyquest-windows.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: newbs/dist/Goyquest-windows.zip
          generate_release_notes: true